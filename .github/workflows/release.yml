name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing package tag to release (for example, @v5x/cli@0.0.25)"
        required: true
        type: string
  push:
    tags:
      - "@v5x/cli@*"
      - "@v5x/events@*"
      - "@v5x/serial@*"
      - "@v5x/web@*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    outputs:
      package_name: ${{ steps.release.outputs.package_name }}
      release_tag: ${{ steps.release.outputs.release_tag }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: package.json
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Set up npm for trusted publishing
        run: npm install --global npm@12.0.1
      - run: bun install --frozen-lockfile
      - name: Resolve release tag
        id: release
        env:
          MANUAL_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          case "$GITHUB_EVENT_NAME" in
            workflow_dispatch)
              tag="$MANUAL_RELEASE_TAG"
              ;;
            push)
              tag="${GITHUB_REF#refs/tags/}"
              ;;
            *)
              echo "Unsupported release event: $GITHUB_EVENT_NAME" >&2
              exit 1
              ;;
          esac

          if ! git show-ref --verify --quiet "refs/tags/$tag"; then
            echo "Release tag does not exist in the repository: $tag" >&2
            exit 1
          fi

          package_name="${tag%@*}"
          version="${tag##*@}"

          case "$package_name" in
            @v5x/cli)
              package_dir="packages/cli"
              tarball_glob="v5x-cli-*.tgz"
              ;;
            @v5x/events)
              package_dir="packages/events"
              tarball_glob="v5x-events-*.tgz"
              ;;
            @v5x/serial)
              package_dir="packages/serial"
              tarball_glob="v5x-serial-*.tgz"
              ;;
            @v5x/web)
              package_dir="packages/web"
              tarball_glob="v5x-web-*.tgz"
              ;;
            *)
              echo "Unsupported release tag: $tag" >&2
              exit 1
              ;;
          esac

          package_json_version="$(bun -e 'const packageJson = await Bun.file(process.argv[1]).json(); console.log(packageJson.version);' "$package_dir/package.json")"
          serial_version="$(bun -e 'const packageJson = await Bun.file(process.argv[1]).json(); console.log(packageJson.version);' packages/serial/package.json)"
          if [ "$package_json_version" != "$version" ]; then
            echo "$package_name tag version $version does not match $package_dir/package.json version $package_json_version" >&2
            exit 1
          fi

          {
            echo "package_name=$package_name"
            echo "package_dir=$package_dir"
            echo "release_tag=$tag"
            echo "tarball_glob=$tarball_glob"
            echo "version=$version"
            echo "serial_version=$serial_version"
          } >> "$GITHUB_OUTPUT"
      - name: Check changelog entry
        run: |
          set -euo pipefail
          package_name="${{ steps.release.outputs.package_name }}"
          version="${{ steps.release.outputs.version }}"
          heading="^### ${package_name} ${version} - ([0-9]{4}-[0-9]{2}-[0-9]{2})$"

          changelog_heading="$(grep -E "$heading" CHANGELOG.md | head -n 1 || true)"
          if [ -z "$changelog_heading" ]; then
            echo "CHANGELOG.md must contain a release heading for ${package_name} ${version} with a valid calendar date in YYYY-MM-DD format:"
            echo "### ${package_name} ${version} - YYYY-MM-DD"
            exit 1
          fi

          changelog_date="${changelog_heading##* - }"
          if [ "$(date -u -d "$changelog_date" +%F 2>/dev/null || true)" != "$changelog_date" ]; then
            echo "CHANGELOG.md release heading for ${package_name} ${version} must use a valid calendar date in YYYY-MM-DD format:"
            echo "$changelog_heading"
            exit 1
          fi
      - name: Format check
        run: |
          if ! bun run format:check; then
            echo "::error::Formatting issues found. Run 'bun run format' locally. Diff of required changes:"
            bunx prettier --write . >/dev/null
            git --no-pager diff
            git checkout -- .
            exit 1
          fi
      - name: Lint
        if: ${{ !cancelled() }}
        run: bun run lint
      - name: Typecheck
        if: ${{ !cancelled() }}
        run: bun run typecheck
      - name: Check documentation
        if: ${{ !cancelled() }}
        run: bun run docs:check
      - name: Test
        if: ${{ !cancelled() }}
        run: bun run test
      - name: Build
        if: ${{ !cancelled() }}
        run: bun run build
      - name: Audit
        if: ${{ !cancelled() }}
        run: bun audit
      - name: Check serial release dependency
        if: ${{ steps.release.outputs.package_name == '@v5x/cli' || steps.release.outputs.package_name == '@v5x/web' }}
        run: |
          set -euo pipefail
          serial_version="${{ steps.release.outputs.serial_version }}"
          published_serial_version="$(npm view "@v5x/serial@${serial_version}" version)"
          if [ "$published_serial_version" != "$serial_version" ]; then
            echo "@v5x/serial@${serial_version} must be published before releasing ${{ steps.release.outputs.package_name }}" >&2
            exit 1
          fi
      - name: Pack and verify package
        id: package
        run: |
          set -euo pipefail
          release_dir="$(mktemp -d)"
          cd "${{ steps.release.outputs.package_dir }}"
          bun pm pack --destination "$release_dir"
          cd "$GITHUB_WORKSPACE"
          tarballs=("$release_dir"/${{ steps.release.outputs.tarball_glob }})
          if [ "${#tarballs[@]}" -ne 1 ] || [ ! -f "${tarballs[0]}" ]; then
            echo "Expected exactly one packed tarball in $release_dir" >&2
            exit 1
          fi
          bun scripts/verify-package-tarballs.ts --serial-version "${{ steps.release.outputs.serial_version }}" "${tarballs[0]}"
          echo "tarball=${tarballs[0]}" >> "$GITHUB_OUTPUT"
      - name: Check npm publication
        id: npm
        run: |
          set -euo pipefail
          package_name="${{ steps.release.outputs.package_name }}"
          version="${{ steps.release.outputs.version }}"
          published_version="$(npm view "${package_name}@${version}" version 2>/dev/null || true)"

          if [ "$published_version" = "$version" ]; then
            echo "${package_name}@${version} is already published; npm publication will be skipped."
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to npm
        if: ${{ steps.npm.outputs.already_published != 'true' }}
        run: |
          set -euo pipefail
          tarball="${{ steps.package.outputs.tarball }}"

          if env -u NODE_AUTH_TOKEN npm publish "$tarball" --provenance --access public; then
            exit 0
          fi

          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "Trusted publishing failed and no NPM_TOKEN fallback is configured." >&2
            exit 1
          fi

          echo "::notice::Trusted publishing failed; retrying with the configured NPM_TOKEN."
          npm publish "$tarball" --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  cli-binaries:
    if: ${{ needs.publish.outputs.package_name == '@v5x/cli' }}
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.publish.outputs.release_tag }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: package.json
      - run: bun install --frozen-lockfile
      - name: Build standalone CLI binaries
        run: |
          set -euo pipefail
          bun run --cwd packages/serial build
          mkdir -p artifacts

          for target in linux-x64 linux-arm64 darwin-x64 darwin-arm64; do
            bun build packages/cli/src/index.ts \
              --compile \
              --target="bun-${target}" \
              --outfile="artifacts/v5x-${target}"
          done

          cd artifacts
          sha256sum v5x-* > SHA256SUMS
      - name: Create GitHub release
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" artifacts/* --clobber
          else
            gh release create "$RELEASE_TAG" artifacts/* \
              --generate-notes \
              --title "$RELEASE_TAG" \
              --verify-tag
          fi
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.publish.outputs.release_tag }}
