name: Quality

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run format:check
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run test
      - run: bun run build
      - run: bun audit
      - name: Pack and install published packages
        run: |
          set -euo pipefail
          smoke_dir="$(mktemp -d)"
          cd packages/serial
          bun pm pack --destination "$smoke_dir"
          cd ../cli
          bun pm pack --destination "$smoke_dir"
          cd ../..
          bun scripts/verify-package-tarballs.ts "$smoke_dir"/*.tgz
          cd "$smoke_dir"
          bun init -y
          bun add ./v5x-serial-*.tgz ./v5x-cli-*.tgz
          bun -e 'import("@v5x/serial").then((module) => { if (typeof module.V5SerialDevice !== "function") throw new Error("missing V5SerialDevice export"); })'
          node -e 'const module = require("@v5x/serial"); if (typeof module.V5SerialDevice !== "function") throw new Error("missing CommonJS export")'
          bun -e 'await Bun.write("consumer.ts", "import { VexFirmwareVersion } from \"@v5x/serial\";\nnew VexFirmwareVersion(1, 2, 3, 4);\n"); await Bun.write("tsconfig.json", JSON.stringify({ compilerOptions: { module: "NodeNext", moduleResolution: "NodeNext", strict: true, noEmit: true } }));'
          "$GITHUB_WORKSPACE/node_modules/.bin/tsc" -p tsconfig.json
          ./node_modules/.bin/v5x --help
