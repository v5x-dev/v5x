name: Quality

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: package.json
      - run: bun install --frozen-lockfile
      - name: Format check
        run: |
          if ! bun run format:check; then
            echo "::error::Formatting issues found. Run 'bun run format' locally. Diff of required changes:"
            bunx prettier --write . >/dev/null
            git --no-pager diff
            git checkout -- .
            exit 1
          fi
      - name: Lint
        if: ${{ !cancelled() }}
        run: bun run lint
      - name: Typecheck
        if: ${{ !cancelled() }}
        run: bun run typecheck
      - name: Test
        if: ${{ !cancelled() }}
        run: bun run test
      - run: bun run build
      - run: bun audit
      - name: Pack and install published packages
        run: |
          set -euo pipefail
          smoke_dir="$(mktemp -d)"
          cd packages/serial
          bun pm pack --destination "$smoke_dir"
          cd ../cli
          bun pm pack --destination "$smoke_dir"
          cd ../web
          bun pm pack --destination "$smoke_dir"
          cd ../events
          bun pm pack --destination "$smoke_dir"
          cd ../..
          bun scripts/verify-package-tarballs.ts "$smoke_dir"/*.tgz
          cd "$smoke_dir"
          bun init -y
          bun add ./v5x-serial-*.tgz
          bun add ./v5x-cli-*.tgz
          bun add ./v5x-events-*.tgz
          bun add ./v5x-web-*.tgz react@19.2.7 @types/react@19.2.7 svelte@5.46.0 solid-js@1.9.10
          bun -e 'import("@v5x/serial").then((module) => { if (typeof module.V5SerialDevice !== "function") throw new Error("missing V5SerialDevice export"); })'
          node -e 'const module = require("@v5x/serial"); if (typeof module.V5SerialDevice !== "function") throw new Error("missing CommonJS export")'
          bun -e 'const module = await import("@v5x/events"); if (typeof module.Robot !== "function") throw new Error("missing @v5x/events Robot export");'
          bun -e 'const module = await import("@v5x/web"); if (typeof module.createV5Client !== "function") throw new Error("missing @v5x/web createV5Client export");'
          bun -e 'const module = await import("@v5x/web/testing"); if (typeof module.createV5ClientWithFactory !== "function") throw new Error("missing @v5x/web/testing createV5ClientWithFactory export");'
          bun -e 'const module = await import("@v5x/web/react"); if (typeof module.V5Provider !== "function" || typeof module.useV5Snapshot !== "function") throw new Error("missing @v5x/web/react exports");'
          bun -e 'const module = await import("@v5x/web/svelte"); if (typeof module.createV5State !== "function") throw new Error("missing @v5x/web/svelte exports");'
          bun -e 'const module = await import("@v5x/web/solid"); if (typeof module.V5Provider !== "function" || typeof module.createV5Snapshot !== "function") throw new Error("missing @v5x/web/solid exports");'
          bun -e 'await Bun.write("consumer.ts", "import { Robot } from \"@v5x/events\";\nimport { VexFirmwareVersion } from \"@v5x/serial\";\nimport { createV5Client } from \"@v5x/web\";\nimport { createV5ClientWithFactory } from \"@v5x/web/testing\";\nimport { V5Provider as ReactV5Provider } from \"@v5x/web/react\";\nimport { createV5State } from \"@v5x/web/svelte\";\nimport { V5Provider as SolidV5Provider } from \"@v5x/web/solid\";\nvoid Robot;\nnew VexFirmwareVersion(1, 2, 3, 4);\nvoid createV5Client;\nvoid createV5ClientWithFactory;\nvoid ReactV5Provider;\nvoid createV5State;\nvoid SolidV5Provider;\n"); await Bun.write("tsconfig.json", JSON.stringify({ compilerOptions: { module: "NodeNext", moduleResolution: "NodeNext", strict: true, noEmit: true } }));'
          "$GITHUB_WORKSPACE/node_modules/.bin/tsc" -p tsconfig.json
          bun build consumer.ts --target browser --outdir browser-smoke
          ./node_modules/.bin/v5x --help
