name: Bug report
description: Report reproducible behavior that is not working as expected.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve v5x. Please remove secrets and identifying device data from diagnostics.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Run ...
        2. Connect ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: v5x doctor output
      description: Paste the output of `v5x doctor --json`. Remove secrets and identifying device data first.
      render: json
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add logs, screenshots, or other details that may help.
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues for this problem.
          required: true
        - label: This report does not disclose a security vulnerability.
          required: true
